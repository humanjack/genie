name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install
        run: |
          python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e ".[dev]"
      - name: Lint
        run: |
          .venv/bin/ruff check genie tests
          .venv/bin/ruff format --check genie tests
      - name: Typecheck
        run: .venv/bin/pyright
      - name: Tests with coverage
        run: .venv/bin/pytest --cov=genie --cov-report=term-missing --cov-fail-under=70
